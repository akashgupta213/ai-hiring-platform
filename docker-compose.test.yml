# Isolated Postgres + Redis for running the test suite (Week 7).
# Runs on different ports so it can coexist with the dev stack.
services:
  postgres-test:
    image: pgvector/pgvector:pg16
    container_name: ai-hiring-postgres-test
    environment:
      POSTGRES_USER: hiring
      POSTGRES_PASSWORD: hiring_test_pw
      POSTGRES_DB: ai_hiring_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data

  redis-test:
    image: redis:7-alpine
    container_name: ai-hiring-redis-test
    ports:
      - "6380:6379"
